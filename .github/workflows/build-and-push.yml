name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: container-builder
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPO: ${{ github.repository }}
        run: |
          IMAGE_LOWER=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          SHA="${GITHUB_SHA::7}"
          VERSION="${TIMESTAMP}-${SHA}"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "image_tag=${REGISTRY}/${IMAGE_LOWER}:${VERSION}" >> $GITHUB_OUTPUT
          echo "latest_tag=${REGISTRY}/${IMAGE_LOWER}:latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
